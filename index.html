<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controlador Maestro SGMP</title>
  <script>
    /*
      CONFIGURACIÓN CRÍTICA
      Reemplazar por la URL /exec del Apps Script desplegado
    */
    const API_URL = "https://script.google.com/macros/s/AKfycbyv8GAQZvU1ibuoShnLJ1rRZZOIuG1YKw96w6ex6mbQyqNxK60YWpyaHZT5RadTVomxVQ/exec";

    async function api(action, payload = {}) {
      const body = { action, ...payload };
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      return await res.json();
    }

    async function login() {
      const user = document.getElementById("user").value.trim();
      const password = document.getElementById("password").value.trim();
      const pin = document.getElementById("pin").value.trim();

      if (!user || !password || !pin) {
        alert("Completa usuario, contraseña y PIN");
        return;
      }

      try {
        const result = await api("login", { user, password, pin });

        if (!result.ok) {
          alert(result.message || "Login inválido");
          return;
        }

        window.currentUser = result.user;
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("mainBox").style.display = "block";

        document.getElementById("welcome").innerText =
          `Bienvenido ${result.user.name}`;

        await loadInitiatives();
      } catch (e) {
        alert("Error conectando con Apps Script: " + e.message);
      }
    }

    async function loadInitiatives() {
      try {
        const result = await api("getInitiatives", {
          user: window.currentUser.user
        });

        const box = document.getElementById("initiatives");
        box.innerHTML = "";

        (result.items || []).forEach(item => {
          const div = document.createElement("div");
          div.style.padding = "12px";
          div.style.marginBottom = "10px";
          div.style.border = "1px solid #d8e0ec";
          div.style.borderRadius = "12px";
          div.innerHTML = `<strong>${item.name}</strong><br>${item.status}`;
          box.appendChild(div);
        });
      } catch (e) {
        alert("No se pudieron cargar iniciativas");
      }
    }
  </script>
</head>
<body style="font-family:Arial;background:#EEF2F8;padding:30px;">

  <div id="loginBox" style="max-width:420px;background:white;padding:24px;border-radius:16px;">
    <h2>Controlador Maestro SGMP</h2>
    <p>Acceso online conectado a Google Sheets</p>

    <label>Usuario</label><br>
    <input id="user" style="width:100%;margin-bottom:12px;" /><br>

    <label>Contraseña</label><br>
    <input id="password" type="password" style="width:100%;margin-bottom:12px;" /><br>

    <label>PIN Admin</label><br>
    <input id="pin" type="password" style="width:100%;margin-bottom:12px;" /><br><br>

    <button onclick="login()">Entrar</button>
  </div>

  <div id="mainBox" style="display:none;">
    <h2 id="welcome"></h2>
    <h3>Iniciativas</h3>
    <div id="initiatives"></div>
  </div>

</body>
</html>
